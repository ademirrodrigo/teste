services:
  api:
    build: .
    command: uvicorn ecac_automation.api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on: [redis, db]
    ports: ["8000:8000"]
    volumes:
      - ./certs:/app/certs

  worker-auth:
    build: .
    command: celery -A ecac_automation.workers.celery_app.celery_app worker -Q auth --loglevel=info
    env_file: .env
    depends_on: [redis, db]
    volumes:
      - ./certs:/app/certs

  worker-extract:
    build: .
    command: celery -A ecac_automation.workers.celery_app.celery_app worker -Q extract --loglevel=info
    env_file: .env
    depends_on: [redis, db]

  redis:
    image: redis:7-alpine

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ecac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
